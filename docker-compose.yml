services:
  app:
     build: . 
     ports:
       - "4000:4000"
     env_file:
       - .env
     depends_on:
       - db
     networks:
       - app-network

  db:
      image: postgres:latest
      env_file:
        - .env
      ports:
        - "5432:5432"
      volumes:
        - db_data:/var/lib/postgresql/data
      networks:
        - app-network

volumes:
  db_data:
networks:
  app-network: